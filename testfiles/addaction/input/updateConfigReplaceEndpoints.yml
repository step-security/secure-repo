name: test-replace-endpoints
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            xyz.com:443
            old-api.example.com:443
            internal.corp.net:8080

      - uses: actions/checkout@v3
      - run: echo "build"
