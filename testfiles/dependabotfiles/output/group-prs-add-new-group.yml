version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      prod-deps:
        patterns:
          - "react*"
        dependency-type: production
      dev-deps:
        patterns:
          - eslint*
          - jest*
        dependency-type: development
        update-types:
          - minor
          - patch
