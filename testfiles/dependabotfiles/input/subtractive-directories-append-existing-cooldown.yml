version: 2
updates:
  # CI actions - keep up to date
  - package-ecosystem: github-actions
    directories:
      - /
    schedule:
      interval: daily

  # .NET dependencies
  - package-ecosystem: nuget
    directory: /.github/workflows/execute-build/test_apps/DotnetHelloWorld/AerospikeHelloWorld/AerospikeHelloWorld
    schedule:
      interval: daily

  # Container images
  - package-ecosystem: docker
    directory: /.github/workflows/execute-build/test_apps/hi
    schedule:
      interval: daily

  # Node.js dependencies
  - package-ecosystem: npm
    directories:
      - /
    schedule:
      interval: daily

registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.NPM_TOKEN }}
